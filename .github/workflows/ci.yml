name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: password123!
        ports:
          - 5174:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P password123! -C -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Install EF tools
        run: dotnet tool install --global dotnet-ef

      - name: Build
        run: dotnet build --no-restore

      - name: Create databases
        run: |
          docker exec $(docker ps -q --filter ancestor=mcr.microsoft.com/mssql/server:2022-latest) \
            /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P password123! -C -Q "
              CREATE DATABASE DatabaseTable;
              CREATE DATABASE DatabaseTrigger;
              CREATE DATABASE EfTable;
              CREATE DATABASE ByReflection;
              CREATE DATABASE ByEF;"

      - name: Run migrations
        run: |
          dotnet ef database update --project DbAuditWithEF.DatabaseTable
          dotnet ef database update --project DbAuditWithEF.DatabaseTrigger
          dotnet ef database update --project DbAuditWithEF.EFTable
          dotnet ef database update --project DbAuditWithEF.ByReflection
          dotnet ef database update --project DbAuditWithEF.ByEF

      - name: Test
        run: dotnet test --no-build --verbosity normal
